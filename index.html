<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPOB Desa Panglima Raja</title>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">

    <div class="logo">
        <h1>PPOB Desa Panglima Raja</h1>
        <p>Layanan Pembayaran Online</p>
    </div>

    <div class="saldo-box">
        <span>Saldo</span>
        <h2>Rp <span id="saldo">0</span></h2>
    </div>

</div>

    <div class="banner">
    <marquee id="promoText">
    Memuat promo...
    </marquee>
    </div>

<div class="menu">

<button onclick="filterProduk('Pulsa')">📱 Pulsa</button>

<button onclick="filterProduk('Dana')">💙 Dana</button>

<button onclick="filterProduk('OVO')">🟣 OVO</button>

<button onclick="filterProduk('Gopay')">🟢 Gopay</button>

<button onclick="filterProduk('ShopeePay')">🛍️ ShopeePay</button>

<button onclick="filterProduk('Token PLN')">⚡ PLN</button>

<button onclick="filterProduk('Diamond')">🎮 Game</button>

<button onclick="tampilkan(semuaProduk)">🏠 Semua</button>

<button onclick="hubungiAdmin()">
☎ Admin
</button>

</div>

<input
type="text"
id="cari"
placeholder="Cari produk..."
>

<div id="produkContainer"></div>

<div id="popup" class="popup">

    <div class="popup-content">

        <h3 id="popupProduk"></h3>

        <input
        type="text"
        id="tujuan"
        placeholder="Nomor HP / ID Pelanggan">

        <input
        type="hidden"
        id="produkDipilih">

        <input
        type="hidden"
        id="hargaDipilih">

        <button onclick="kirimWA()">
            Lanjut Pesan
        </button>

        <button onclick="tutupPopup()">
            Batal
        </button>

    </div>

</div>

<script>

fetch('?api=produk')
  .then(res => res.json())
  .then(data => {
      console.log('DATA PRODUK:', data);
      console.log('JUMLAH:', data.length);
  });

</script>

<script src="js/script.js"></script>

</body>
</html>
