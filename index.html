<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PPOB Desa Panglima Raja</title>
    
    <!-- Menggunakan Font Google 'Poppins' agar terlihat lebih modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Menggunakan FontAwesome untuk Ikon Menu -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" href="./icon-192.png">

    <style>
        /* === RESET & DASAR === */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #eef2f6;
            margin: 0;
            display: flex;
            justify-content: center;
            color: #333;
        }
        /* Membatasi lebar layar agar seperti HP meskipun dibuka di Laptop */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        /* === HEADER & SALDO (GAYA FINTECH) === */
        .header-bg {
            background: linear-gradient(135deg, #0b5394, #0d6efd);
            padding: 25px 20px 70px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            color: white;
        }
        .header-text h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .header-text p {
            margin: 2px 0 0 0;
            font-size: 12px;
            opacity: 0.8;
        }

        .saldo-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: -45px 20px 20px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .saldo-info span {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 500;
        }
        .saldo-info h2 {
            margin: 5px 0 0 0;
            font-size: 22px;
            color: #2c3e50;
            font-weight: 700;
        }
        .saldo-icon {
            background: #eef4fb;
            color: #0b5394;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        /* === RUNNING TEXT (PROMO) === */
        .banner-container {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .banner {
            background: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffeeba;
        }

        /* === MENU GRID (GAYA OVO/DANA) === */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px 10px;
            padding: 0 20px 25px 20px;
        }
        .menu-btn {
            background: none;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: transform 0.2s;
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .menu-btn span {
            font-size: 11px;
            color: #4a4a4a;
            font-weight: 500;
        }
        
        /* Warna Ikon Masing-masing */
        .bg-pulsa { background: linear-gradient(135deg, #FF9A9E, #FECFEF); color: #d63031; }
        .bg-dana { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .bg-ovo { background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #4a235a; }
        .bg-gopay { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #006266; }
        .bg-shopee { background: linear-gradient(135deg, #ff9a44, #fc6076); }
        .bg-pln { background: linear-gradient(135deg, #f6d365, #fda085); color: #b76e00; }
        .bg-game { background: linear-gradient(135deg, #30cfd0, #330867); }
        .bg-semua { background: #f1f2f6; color: #57606f; box-shadow: none; }
        .bg-status { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }

        /* === SEARCH BAR === */
        .search-container {
            padding: 0 20px 15px 20px;
            position: relative;
        }
        .search-container i {
            position: absolute;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
        }
        #cari {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            outline: none;
            transition: all 0.3s;
        }
        #cari:focus {
            border-color: #0b5394;
            background: white;
            box-shadow: 0 0 0 3px rgba(11, 83, 148, 0.1);
        }

        /* === DAFTAR PRODUK (CSS GRID MENYESUAIKAN JS KAMU) === */
        #produkContainer {
            padding: 0 20px;
        }
        .card {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 4px 10px;
        }
        .card:last-child {
            border-bottom: none;
        }
        .card h3 {
            grid-column: 1;
            grid-row: 1;
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: #2d3436;
        }
        .card p {
            grid-column: 1;
            grid-row: 2;
            margin: 0;
            font-size: 12px;
            color: #636e72;
        }
        .card .harga {
            grid-column: 2;
            grid-row: 1;
            font-size: 14px;
            font-weight: 700;
            color: #0b5394;
            text-align: right;
        }
        .card .beli {
            grid-column: 2;
            grid-row: 2;
            justify-self: end;
            background: #0b5394;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        .card .beli:active {
            transform: scale(0.9);
            background: #083c6d;
        }

        /* === POPUP BOTTOM SHEET (ANDROID STYLE) === */
        .popup {
            display: none; /* JS Kamu mengatur ini */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end; /* Memaksa ke bawah */
        }
        .popup-content {
            background: white;
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 30px 25px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease-out;
            position: absolute;
            bottom: 0;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .popup-content h3 {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #2c3e50;
            text-align: center;
        }
        .popup-content input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }
        .popup-content input[type="text"]:focus {
            border-color: #0b5394;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: #25D366; /* Warna WhatsApp */
            color: white;
        }
        /* === TOMBOL PILIH PROVIDER === */
        .provider-btn {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
        }
        .provider-btn:active {
            background: #eef4fb;
            border-color: #0b5394;
            transform: scale(0.95);
        }
        .btn-secondary {
            background: #f1f2f6;
            color: #57606f;
        }

        /* Tombol Mengambang (Floating Admin) */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0b5394;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(11, 83, 148, 0.4);
            cursor: pointer;
            z-index: 100;
            border: none;
        }
    </style>

    <!-- Link ke Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Script untuk memanggil Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').then(function(registration) {
            console.log('ServiceWorker sukses dengan scope: ', registration.scope);
          }, function(err) {
            console.log('ServiceWorker gagal: ', err);
          });
        });
      }
    </script>
</head>
<body>

<div class="app-container">

    <!-- Header & Saldo -->
    <div class="header-bg">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="./icon-192.png" alt="Logo PPOB" style="width: 50px; height: 50px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: white;">
            <div class="header-text">
                <h1>Halo, Juragan! 👋</h1>
                <p>PPOB Desa Panglima Raja</p>
            </div>
        </div>
    </div>

    <div class="saldo-card">
        <div class="saldo-info">
            <span>Total Saldo Aktif</span>
            <h2>Rp <span id="saldo">0</span></h2>
        </div>
        <div class="saldo-icon">
            <i class="fa-solid fa-wallet"></i>
        </div>
    </div>

    <!-- Banner Promo -->
    <div class="banner-container">
        <div class="banner">
            <i class="fa-solid fa-bullhorn"></i>
            <marquee id="promoText">Memuat promo menarik untuk Anda hari ini...</marquee>
        </div>
    </div>

    <!-- Menu Navigasi -->
    <div class="menu-grid">
        <button class="menu-btn" onclick="filterProduk('Pulsa')">
            <div class="icon-box bg-pulsa"><i class="fa-solid fa-mobile-screen"></i></div>
            <span>Pulsa</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('Dana')">
            <div class="icon-box bg-dana"><i class="fa-solid fa-wallet"></i></div>
            <span>Dana</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('OVO')">
            <div class="icon-box bg-ovo"><i class="fa-solid fa-circle-dot"></i></div>
            <span>OVO</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('Gopay')">
            <div class="icon-box bg-gopay"><i class="fa-solid fa-wallet"></i></div>
            <span>Gopay</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('ShopeePay')">
            <div class="icon-box bg-shopee"><i class="fa-brands fa-shopify"></i></div>
            <span>Shopee</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('Token PLN')">
            <div class="icon-box bg-pln"><i class="fa-solid fa-bolt"></i></div>
            <span>PLN</span>
        </button>
        <button class="menu-btn" onclick="filterProduk('Diamond')">
            <div class="icon-box bg-game"><i class="fa-solid fa-gamepad"></i></div>
            <span>Game</span>
        </button>
        <button class="menu-btn" onclick="tampilkan(semuaProduk)">
            <div class="icon-box bg-semua"><i class="fa-solid fa-border-all"></i></div>
            <span>Semua</span>
        </button>
        <button class="menu-btn" onclick="bukaCekStatus()">
            <div class="icon-box bg-status"><i class="fa-solid fa-magnifying-glass"></i></div>
            <span>Cek Status</span>
        </button>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="cari" placeholder="Cari produk (contoh: Telkomsel)...">
    </div>

    <!-- Container Produk -->
    <div id="produkContainer">
        <!-- Data dari JS akan masuk kesini -->
    </div>

    <!-- Tombol Hubungi Admin Mengambang -->
    <button class="fab" onclick="hubungiAdmin()">
        <i class="fa-brands fa-whatsapp"></i>
    </button>

    <!-- Popup Pembelian (Gaya Bottom Sheet) -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <h3 id="popupProduk">Nama Produk</h3>
            
            <input type="text" id="tujuan" placeholder="Masukkan Nomor HP / ID Pelanggan">
            <input type="hidden" id="produkDipilih">
            <input type="hidden" id="hargaDipilih">
            
            <div class="btn-group">
                <button class="btn-secondary" onclick="tutupPopup()">Batal</button>
                <button class="btn-primary" onclick="kirimWA()">
                    <i class="fa-brands fa-whatsapp"></i> Pesan via WA
                </button>
            </div>
        </div>
    </div>

</div>

<div id="popupCek" class="popup">
        <div class="popup-content">
            <h3>Cek Status Transaksi</h3>
            
            <input type="text" id="idCek" placeholder="Masukkan ID Transaksi (Contoh: TRX-123456)">
            
            <div class="btn-group">
                <button class="btn-secondary" onclick="tutupCek()">Batal</button>
                <button class="btn-primary" style="background: #e67e22;" onclick="prosesCek()">Cek Sekarang</button>
            </div>
            
            <div id="hasilCek" style="margin-top:20px; font-size:14px; text-align:center; padding:10px; border-radius:8px;"></div>
        </div>
    </div>
    <div id="popupProvider" class="popup">
        <div class="popup-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Pilih Provider</h3>
                <button onclick="tutupProvider()" style="background:none; border:none; font-size:24px; color:#95a5a6; cursor:pointer;">&times;</button>
            </div>
            
            <div id="providerContainer" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
            </div>
        </div>
    </div>

<!-- Menghubungkan File JS -->
<script src="js/script.js"></script>

</body>
</html>
